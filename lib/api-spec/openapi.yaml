openapi: 3.1.0
info:
  # Do not change the title, if the title changes, the import paths will be broken
  title: Api
  version: 0.1.0
  description: CRM API for business lead management from Telegram, Instagram and MAX
servers:
  - url: /api
    description: Base API path
tags:
  - name: health
    description: Health operations
  - name: leads
    description: Lead/request management
  - name: analytics
    description: Analytics and statistics
paths:
  /healthz:
    get:
      operationId: healthCheck
      tags: [health]
      summary: Health check
      description: Returns server health status
      responses:
        "200":
          description: Healthy
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/HealthStatus"

  /leads:
    get:
      operationId: listLeads
      tags: [leads]
      summary: List all leads
      parameters:
        - name: status
          in: query
          required: false
          schema:
            type: string
            enum: [hot, warm, cold]
        - name: platform
          in: query
          required: false
          schema:
            type: string
            enum: [Telegram, Instagram, MAX]
        - name: dateFrom
          in: query
          required: false
          schema:
            type: string
        - name: dateTo
          in: query
          required: false
          schema:
            type: string
      responses:
        "200":
          description: List of leads
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Lead"
    post:
      operationId: createLead
      tags: [leads]
      summary: Create a new lead (from bot)
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateLeadBody"
      responses:
        "201":
          description: Lead created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Lead"
        "400":
          description: Validation error
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /leads/{id}:
    get:
      operationId: getLead
      tags: [leads]
      summary: Get a single lead
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Lead details
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Lead"
        "404":
          description: Not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
    patch:
      operationId: updateLead
      tags: [leads]
      summary: Update a lead
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UpdateLeadBody"
      responses:
        "200":
          description: Updated lead
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Lead"
        "404":
          description: Not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
    delete:
      operationId: deleteLead
      tags: [leads]
      summary: Delete a lead
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "204":
          description: Deleted
        "404":
          description: Not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /leads/{id}/status:
    patch:
      operationId: updateLeadStatus
      tags: [leads]
      summary: Update lead status
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UpdateLeadStatusBody"
      responses:
        "200":
          description: Updated lead
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Lead"
        "404":
          description: Not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /analytics/summary:
    get:
      operationId: getAnalyticsSummary
      tags: [analytics]
      summary: Get analytics summary
      responses:
        "200":
          description: Analytics summary
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AnalyticsSummary"

  /analytics/by-platform:
    get:
      operationId: getLeadsByPlatform
      tags: [analytics]
      summary: Get lead counts grouped by platform
      responses:
        "200":
          description: Leads by platform
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/PlatformCount"

  /analytics/by-status:
    get:
      operationId: getLeadsByStatus
      tags: [analytics]
      summary: Get lead counts grouped by status
      responses:
        "200":
          description: Leads by status
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/StatusCount"

  /analytics/recent:
    get:
      operationId: getRecentActivity
      tags: [analytics]
      summary: Get recent lead activity
      responses:
        "200":
          description: Recent leads
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Lead"

components:
  schemas:
    HealthStatus:
      type: object
      properties:
        status:
          type: string
      required:
        - status

    ErrorResponse:
      type: object
      properties:
        error:
          type: string
      required:
        - error

    Lead:
      type: object
      properties:
        id:
          type: integer
        clientName:
          type: string
        platform:
          type: string
          enum: [Telegram, Instagram, MAX]
        service:
          type: string
        details:
          type: ["string", "null"]
        quantity:
          type: ["string", "null"]
        deadline:
          type: ["string", "null"]
        price:
          type: ["string", "null"]
        comment:
          type: ["string", "null"]
        status:
          type: string
          enum: [hot, warm, cold]
        recommendation:
          type: ["string", "null"]
        isPriority:
          type: boolean
        createdAt:
          type: string
        updatedAt:
          type: string
      required:
        - id
        - clientName
        - platform
        - service
        - status
        - isPriority
        - createdAt
        - updatedAt

    CreateLeadBody:
      type: object
      properties:
        clientName:
          type: string
        platform:
          type: string
          enum: [Telegram, Instagram, MAX]
        service:
          type: string
        details:
          type: ["string", "null"]
        quantity:
          type: ["string", "null"]
        deadline:
          type: ["string", "null"]
        price:
          type: ["string", "null"]
        comment:
          type: ["string", "null"]
        status:
          type: string
          enum: [hot, warm, cold]
        recommendation:
          type: ["string", "null"]
        isPriority:
          type: boolean
      required:
        - clientName
        - platform
        - service
        - status

    UpdateLeadBody:
      type: object
      properties:
        clientName:
          type: string
        platform:
          type: string
          enum: [Telegram, Instagram, MAX]
        service:
          type: string
        details:
          type: ["string", "null"]
        quantity:
          type: ["string", "null"]
        deadline:
          type: ["string", "null"]
        price:
          type: ["string", "null"]
        comment:
          type: ["string", "null"]
        status:
          type: string
          enum: [hot, warm, cold]
        recommendation:
          type: ["string", "null"]
        isPriority:
          type: boolean

    UpdateLeadStatusBody:
      type: object
      properties:
        status:
          type: string
          enum: [hot, warm, cold]
      required:
        - status

    AnalyticsSummary:
      type: object
      properties:
        totalLeads:
          type: integer
        hotLeads:
          type: integer
        warmLeads:
          type: integer
        coldLeads:
          type: integer
        averagePrice:
          type: ["number", "null"]
        priorityLeads:
          type: integer
        todayLeads:
          type: integer
      required:
        - totalLeads
        - hotLeads
        - warmLeads
        - coldLeads
        - priorityLeads
        - todayLeads

    PlatformCount:
      type: object
      properties:
        platform:
          type: string
        count:
          type: integer
      required:
        - platform
        - count

    StatusCount:
      type: object
      properties:
        status:
          type: string
        count:
          type: integer
      required:
        - status
        - count
