openapi: 3.1.0
info:
  # Do not change the title, if the title changes, the import paths will be broken
  title: Api
  version: 0.1.0
  description: CRM API для управления заявками бизнеса через Telegram, Instagram и MAX
servers:
  - url: /api
    description: Base API path
tags:
  - name: health
    description: Проверка состояния сервера
  - name: leads
    description: Управление заявками
  - name: analytics
    description: Аналитика и статистика
  - name: tariff
    description: Анализ тарифов и прайс-листов через Gemini AI
  - name: bot
    description: Подключение аккаунтов и внутренний чат заявок
  - name: users
    description: Управление пользователями и API-токенами
  - name: gemini
    description: Gemini AI chat and image operations
  - name: automod
    description: Управление AutoMod для Telegram Business аккаунтов
paths:
  /healthz:
    get:
      operationId: healthCheck
      tags: [health]
      summary: Health check
      description: Returns server health status
      responses:
        "200":
          description: Healthy
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/HealthStatus"

  /leads:
    get:
      operationId: listLeads
      tags: [leads]
      summary: Список всех заявок
      parameters:
        - name: status
          in: query
          required: false
          schema:
            type: string
            enum: [hot, warm, cold]
        - name: platform
          in: query
          required: false
          schema:
            type: string
            enum: [Telegram, Instagram, MAX]
        - name: dateFrom
          in: query
          required: false
          schema:
            type: string
        - name: dateTo
          in: query
          required: false
          schema:
            type: string
      responses:
        "200":
          description: Список заявок
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Lead"
    post:
      operationId: createLead
      tags: [leads]
      summary: Создать новую заявку (от бота)
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateLeadBody"
      responses:
        "201":
          description: Заявка создана
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Lead"
        "400":
          description: Ошибка валидации
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /leads/{id}:
    get:
      operationId: getLead
      tags: [leads]
      summary: Получить заявку
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Детали заявки
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Lead"
        "404":
          description: Не найдено
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
    patch:
      operationId: updateLead
      tags: [leads]
      summary: Обновить заявку
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UpdateLeadBody"
      responses:
        "200":
          description: Обновлённая заявка
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Lead"
        "404":
          description: Не найдено
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
    delete:
      operationId: deleteLead
      tags: [leads]
      summary: Удалить заявку
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "204":
          description: Удалено
        "404":
          description: Не найдено
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /leads/{id}/status:
    patch:
      operationId: updateLeadStatus
      tags: [leads]
      summary: Изменить статус заявки
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UpdateLeadStatusBody"
      responses:
        "200":
          description: Обновлённая заявка
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Lead"
        "404":
          description: Не найдено
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /analytics/summary:
    get:
      operationId: getAnalyticsSummary
      tags: [analytics]
      summary: Сводка аналитики
      responses:
        "200":
          description: Сводка аналитики
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AnalyticsSummary"

  /analytics/by-platform:
    get:
      operationId: getLeadsByPlatform
      tags: [analytics]
      summary: Заявки по платформам
      responses:
        "200":
          description: Заявки по платформам
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/PlatformCount"

  /analytics/by-status:
    get:
      operationId: getLeadsByStatus
      tags: [analytics]
      summary: Заявки по статусам
      responses:
        "200":
          description: Заявки по статусам
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/StatusCount"

  /analytics/recent:
    get:
      operationId: getRecentActivity
      tags: [analytics]
      summary: Последние заявки
      responses:
        "200":
          description: Последние заявки
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Lead"

  /tariff/analyze:
    post:
      operationId: analyzeTariff
      tags: [tariff]
      summary: Анализ прайс-листа через Gemini AI
      description: Принимает текст с описанием товаров и ценами, возвращает структурированный прайс-лист
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/AnalyzeTariffBody"
      responses:
        "200":
          description: Структурированный прайс-лист
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AnalyzeTariffResponse"
        "400":
          description: Ошибка валидации
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "500":
          description: Ошибка AI анализа
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /tariff/settings:
    get:
      operationId: getTariffSettings
      tags: [tariff]
      summary: Получить сохранённый тариф
      responses:
        "200":
          description: Тариф
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/TariffSettings"
    post:
      operationId: saveTariffSettings
      tags: [tariff]
      summary: Сохранить тариф
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/SaveTariffSettingsBody"
      responses:
        "200":
          description: Тариф сохранён
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/TariffSettings"

  /bot/accounts:
    get:
      operationId: listBotAccounts
      tags: [bot]
      summary: Список подключённых аккаунтов
      responses:
        "200":
          description: Подключённые аккаунты
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/BotAccount"
    post:
      operationId: saveBotAccount
      tags: [bot]
      summary: Сохранить данные аккаунта
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/SaveBotAccountBody"
      responses:
        "200":
          description: Аккаунт сохранён
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/BotAccount"
        "400":
          description: Ошибка валидации
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /users/register:
    post:
      operationId: registerUser
      tags: [users]
      summary: Зарегистрировать пользователя и получить API-токен
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/RegisterUserBody"
      responses:
        "200":
          description: Пользователь зарегистрирован
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/UserProfile"
        "400":
          description: Ошибка валидации
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /users/profile:
    get:
      operationId: getUserProfile
      tags: [users]
      summary: Получить профиль текущего пользователя по токену
      parameters:
        - name: apiToken
          in: query
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Профиль пользователя
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/UserProfile"
        "404":
          description: Пользователь не найден
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /license/activate:
    post:
      operationId: activateLicense
      tags: [users]
      summary: Активировать лицензионный ключ
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ActivateLicenseBody"
      responses:
        "200":
          description: Лицензия активирована
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/LicenseStatus"
        "400":
          description: Ошибка
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /license/status:
    get:
      operationId: getLicenseStatus
      tags: [users]
      summary: Статус подписки пользователя
      parameters:
        - name: apiToken
          in: query
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Статус подписки
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/LicenseStatus"
        "404":
          description: Пользователь не найден
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /license/generate:
    post:
      operationId: generateLicenses
      tags: [users]
      summary: Сгенерировать лицензионные ключи (только для администратора)
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/GenerateLicenseBody"
      responses:
        "200":
          description: Ключи сгенерированы
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/GeneratedKeys"
        "403":
          description: Доступ запрещён
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /lead-chat/messages:
    get:
      operationId: listLeadChatMessages
      tags: [bot]
      summary: Чат уведомлений по заявкам
      responses:
        "200":
          description: Сообщения чата
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/LeadChatMessage"

  /automod/settings:
    get:
      operationId: getAutomodSettings
      tags: [automod]
      summary: Получить настройки AutoMod
      responses:
        "200":
          description: Настройки AutoMod
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AutomodSettings"
    post:
      operationId: saveAutomodSettings
      tags: [automod]
      summary: Сохранить настройки AutoMod
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/SaveAutomodSettingsBody"
      responses:
        "200":
          description: Настройки сохранены
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AutomodSettings"

  /automod/connections:
    get:
      operationId: listAutomodConnections
      tags: [automod]
      summary: Список подключённых Business аккаунтов
      responses:
        "200":
          description: Список подключений
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/BusinessConnection"

  /automod/connections/{id}/toggle:
    patch:
      operationId: toggleAutomodConnection
      tags: [automod]
      summary: Включить/выключить AutoMod для подключения
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ToggleAutomodBody"
      responses:
        "200":
          description: Обновлённое подключение
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/BusinessConnection"
        "404":
          description: Не найдено

  /automod/activity:
    get:
      operationId: getAutomodActivity
      tags: [automod]
      summary: Последние сообщения AutoMod
      responses:
        "200":
          description: Список сообщений
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/AutomodMessage"

  /automod/stats:
    get:
      operationId: getAutomodStats
      tags: [automod]
      summary: Статистика AutoMod
      responses:
        "200":
          description: Статистика
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AutomodStats"

  /gemini/conversations:
    get:
      operationId: listGeminiConversations
      tags: [gemini]
      summary: List all conversations
      responses:
        "200":
          description: List of conversations
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/GeminiConversation"
    post:
      operationId: createGeminiConversation
      tags: [gemini]
      summary: Create a new conversation
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateGeminiConversationBody"
      responses:
        "201":
          description: Created conversation
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/GeminiConversation"
  /gemini/conversations/{id}:
    get:
      operationId: getGeminiConversation
      tags: [gemini]
      summary: Get conversation with messages
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Conversation with messages
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/GeminiConversationWithMessages"
        "404":
          description: Not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/GeminiError"
    delete:
      operationId: deleteGeminiConversation
      tags: [gemini]
      summary: Delete a conversation
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "204":
          description: Deleted
        "404":
          description: Not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/GeminiError"
  /gemini/conversations/{id}/messages:
    get:
      operationId: listGeminiMessages
      tags: [gemini]
      summary: List messages in a conversation
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: List of messages
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/GeminiMessage"
    post:
      operationId: sendGeminiMessage
      tags: [gemini]
      summary: Send a message and receive an AI response (SSE stream)
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/SendGeminiMessageBody"
      responses:
        "200":
          description: SSE stream of assistant response chunks
          content:
            text/event-stream: {}
  /gemini/generate-image:
    post:
      operationId: generateGeminiImage
      tags: [gemini]
      summary: Generate an image from a text prompt
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/GenerateGeminiImageBody"
      responses:
        "200":
          description: Generated image data
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/GenerateGeminiImageResponse"

components:
  schemas:
    HealthStatus:
      type: object
      properties:
        status:
          type: string
      required:
        - status

    ErrorResponse:
      type: object
      properties:
        error:
          type: string
      required:
        - error

    Lead:
      type: object
      properties:
        id:
          type: integer
        clientName:
          type: string
        platform:
          type: string
          enum: [Telegram, Instagram, MAX]
        service:
          type: string
        details:
          type: ["string", "null"]
        quantity:
          type: ["string", "null"]
        deadline:
          type: ["string", "null"]
        price:
          type: ["string", "null"]
        comment:
          type: ["string", "null"]
        status:
          type: string
          enum: [hot, warm, cold]
        recommendation:
          type: ["string", "null"]
        isPriority:
          type: boolean
        createdAt:
          type: string
        updatedAt:
          type: string
      required:
        - id
        - clientName
        - platform
        - service
        - status
        - isPriority
        - createdAt
        - updatedAt

    CreateLeadBody:
      type: object
      properties:
        clientName:
          type: string
        platform:
          type: string
          enum: [Telegram, Instagram, MAX]
        service:
          type: string
        details:
          type: ["string", "null"]
        quantity:
          type: ["string", "null"]
        deadline:
          type: ["string", "null"]
        price:
          type: ["string", "null"]
        comment:
          type: ["string", "null"]
        status:
          type: string
          enum: [hot, warm, cold]
        recommendation:
          type: ["string", "null"]
        isPriority:
          type: boolean
      required:
        - clientName
        - platform
        - service
        - status

    UpdateLeadBody:
      type: object
      properties:
        clientName:
          type: string
        platform:
          type: string
          enum: [Telegram, Instagram, MAX]
        service:
          type: string
        details:
          type: ["string", "null"]
        quantity:
          type: ["string", "null"]
        deadline:
          type: ["string", "null"]
        price:
          type: ["string", "null"]
        comment:
          type: ["string", "null"]
        status:
          type: string
          enum: [hot, warm, cold]
        recommendation:
          type: ["string", "null"]
        isPriority:
          type: boolean

    UpdateLeadStatusBody:
      type: object
      properties:
        status:
          type: string
          enum: [hot, warm, cold]
      required:
        - status

    AnalyticsSummary:
      type: object
      properties:
        totalLeads:
          type: integer
        hotLeads:
          type: integer
        warmLeads:
          type: integer
        coldLeads:
          type: integer
        averagePrice:
          type: ["number", "null"]
        priorityLeads:
          type: integer
        todayLeads:
          type: integer
      required:
        - totalLeads
        - hotLeads
        - warmLeads
        - coldLeads
        - priorityLeads
        - todayLeads

    PlatformCount:
      type: object
      properties:
        platform:
          type: string
        count:
          type: integer
      required:
        - platform
        - count

    StatusCount:
      type: object
      properties:
        status:
          type: string
        count:
          type: integer
      required:
        - status
        - count

    AnalyzeTariffBody:
      type: object
      properties:
        rawText:
          type: string
          description: Произвольный текст с описанием товаров/услуг и ценами
        businessType:
          type: ["string", "null"]
          description: Тип бизнеса (например, кондитерская, фотограф)
        platforms:
          type: string
          description: JSON array of selected platforms e.g. '["Telegram","Instagram","MAX"]'
      required:
        - rawText

    TariffItem:
      type: object
      properties:
        name:
          type: string
        description:
          type: ["string", "null"]
        price:
          type: string
        unit:
          type: ["string", "null"]
        category:
          type: ["string", "null"]
      required:
        - name
        - price

    AnalyzeTariffResponse:
      type: object
      properties:
        businessType:
          type: string
        items:
          type: array
          items:
            $ref: "#/components/schemas/TariffItem"
        summary:
          type: string
        botPrompt:
          type: string
          description: Готовый промпт для бота, который будет общаться с клиентами
      required:
        - businessType
        - items
        - summary
        - botPrompt

    TariffSettings:
      type: object
      properties:
        id:
          type: integer
        rawText:
          type: string
        businessType:
          type: string
        structuredData:
          type: string
        botPrompt:
          type: string
        platforms:
          type: string
          description: JSON array of selected platforms e.g. '["Telegram","Instagram","MAX"]'
        createdAt:
          type: string
        updatedAt:
          type: string
      required:
        - id
        - rawText
        - businessType
        - structuredData
        - botPrompt
        - platforms
        - createdAt
        - updatedAt

    SaveTariffSettingsBody:
      type: object
      properties:
        rawText:
          type: string
        businessType:
          type: string
        structuredData:
          type: string
        botPrompt:
          type: string
        platforms:
          type: string
          description: JSON array of selected platforms e.g. '["Telegram","Instagram","MAX"]'
      required:
        - rawText
        - businessType
        - structuredData
        - botPrompt
        - platforms

    BotAccount:
      type: object
      properties:
        id:
          type: integer
        platform:
          type: string
          enum: [Telegram, Instagram, MAX]
        accountName:
          type: string
        accountHandle:
          type: string
        notificationChat:
          type: string
        isActive:
          type: boolean
        createdAt:
          type: string
        updatedAt:
          type: string
      required:
        - id
        - platform
        - accountName
        - accountHandle
        - notificationChat
        - isActive
        - createdAt
        - updatedAt

    SaveBotAccountBody:
      type: object
      properties:
        platform:
          type: string
          enum: [Telegram, Instagram, MAX]
        accountName:
          type: string
        accountHandle:
          type: string
        notificationChat:
          type: string
        isActive:
          type: boolean
      required:
