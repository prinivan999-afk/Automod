openapi: 3.1.0
info:
  # Do not change the title, if the title changes, the import paths will be broken
  title: Api
  version: 0.1.0
  description: CRM API для управления заявками бизнеса через Telegram, Instagram и MAX
servers:
  - url: /api
    description: Base API path
tags:
  - name: health
    description: Проверка состояния сервера
  - name: leads
    description: Управление заявками
  - name: analytics
    description: Аналитика и статистика
  - name: tariff
    description: Анализ тарифов и прайс-листов через Gemini AI
paths:
  /healthz:
    get:
      operationId: healthCheck
      tags: [health]
      summary: Health check
      description: Returns server health status
      responses:
        "200":
          description: Healthy
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/HealthStatus"

  /leads:
    get:
      operationId: listLeads
      tags: [leads]
      summary: Список всех заявок
      parameters:
        - name: status
          in: query
          required: false
          schema:
            type: string
            enum: [hot, warm, cold]
        - name: platform
          in: query
          required: false
          schema:
            type: string
            enum: [Telegram, Instagram, MAX]
        - name: dateFrom
          in: query
          required: false
          schema:
            type: string
        - name: dateTo
          in: query
          required: false
          schema:
            type: string
      responses:
        "200":
          description: Список заявок
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Lead"
    post:
      operationId: createLead
      tags: [leads]
      summary: Создать новую заявку (от бота)
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateLeadBody"
      responses:
        "201":
          description: Заявка создана
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Lead"
        "400":
          description: Ошибка валидации
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /leads/{id}:
    get:
      operationId: getLead
      tags: [leads]
      summary: Получить заявку
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Детали заявки
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Lead"
        "404":
          description: Не найдено
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
    patch:
      operationId: updateLead
      tags: [leads]
      summary: Обновить заявку
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UpdateLeadBody"
      responses:
        "200":
          description: Обновлённая заявка
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Lead"
        "404":
          description: Не найдено
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
    delete:
      operationId: deleteLead
      tags: [leads]
      summary: Удалить заявку
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "204":
          description: Удалено
        "404":
          description: Не найдено
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /leads/{id}/status:
    patch:
      operationId: updateLeadStatus
      tags: [leads]
      summary: Изменить статус заявки
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UpdateLeadStatusBody"
      responses:
        "200":
          description: Обновлённая заявка
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Lead"
        "404":
          description: Не найдено
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /analytics/summary:
    get:
      operationId: getAnalyticsSummary
      tags: [analytics]
      summary: Сводка аналитики
      responses:
        "200":
          description: Сводка аналитики
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AnalyticsSummary"

  /analytics/by-platform:
    get:
      operationId: getLeadsByPlatform
      tags: [analytics]
      summary: Заявки по платформам
      responses:
        "200":
          description: Заявки по платформам
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/PlatformCount"

  /analytics/by-status:
    get:
      operationId: getLeadsByStatus
      tags: [analytics]
      summary: Заявки по статусам
      responses:
        "200":
          description: Заявки по статусам
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/StatusCount"

  /analytics/recent:
    get:
      operationId: getRecentActivity
      tags: [analytics]
      summary: Последние заявки
      responses:
        "200":
          description: Последние заявки
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Lead"

  /tariff/analyze:
    post:
      operationId: analyzeTariff
      tags: [tariff]
      summary: Анализ прайс-листа через Gemini AI
      description: Принимает текст с описанием товаров и ценами, возвращает структурированный прайс-лист
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/AnalyzeTariffBody"
      responses:
        "200":
          description: Структурированный прайс-лист
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AnalyzeTariffResponse"
        "400":
          description: Ошибка валидации
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "500":
          description: Ошибка AI анализа
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /tariff/settings:
    get:
      operationId: getTariffSettings
      tags: [tariff]
      summary: Получить сохранённый тариф
      responses:
        "200":
          description: Тариф
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/TariffSettings"
    post:
      operationId: saveTariffSettings
      tags: [tariff]
      summary: Сохранить тариф
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/SaveTariffSettingsBody"
      responses:
        "200":
          description: Тариф сохранён
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/TariffSettings"

components:
  schemas:
    HealthStatus:
      type: object
      properties:
        status:
          type: string
      required:
        - status

    ErrorResponse:
      type: object
      properties:
        error:
          type: string
      required:
        - error

    Lead:
      type: object
      properties:
        id:
          type: integer
        clientName:
          type: string
        platform:
          type: string
          enum: [Telegram, Instagram, MAX]
        service:
          type: string
        details:
          type: ["string", "null"]
        quantity:
          type: ["string", "null"]
        deadline:
          type: ["string", "null"]
        price:
          type: ["string", "null"]
        comment:
          type: ["string", "null"]
        status:
          type: string
          enum: [hot, warm, cold]
        recommendation:
          type: ["string", "null"]
        isPriority:
          type: boolean
        createdAt:
          type: string
        updatedAt:
          type: string
      required:
        - id
        - clientName
        - platform
        - service
        - status
        - isPriority
        - createdAt
        - updatedAt

    CreateLeadBody:
      type: object
      properties:
        clientName:
          type: string
        platform:
          type: string
          enum: [Telegram, Instagram, MAX]
        service:
          type: string
        details:
          type: ["string", "null"]
        quantity:
          type: ["string", "null"]
        deadline:
          type: ["string", "null"]
        price:
          type: ["string", "null"]
        comment:
          type: ["string", "null"]
        status:
          type: string
          enum: [hot, warm, cold]
        recommendation:
          type: ["string", "null"]
        isPriority:
          type: boolean
      required:
        - clientName
        - platform
        - service
        - status

    UpdateLeadBody:
      type: object
      properties:
        clientName:
          type: string
        platform:
          type: string
          enum: [Telegram, Instagram, MAX]
        service:
          type: string
        details:
          type: ["string", "null"]
        quantity:
          type: ["string", "null"]
        deadline:
          type: ["string", "null"]
        price:
          type: ["string", "null"]
        comment:
          type: ["string", "null"]
        status:
          type: string
          enum: [hot, warm, cold]
        recommendation:
          type: ["string", "null"]
        isPriority:
          type: boolean

    UpdateLeadStatusBody:
      type: object
      properties:
        status:
          type: string
          enum: [hot, warm, cold]
      required:
        - status

    AnalyticsSummary:
      type: object
      properties:
        totalLeads:
          type: integer
        hotLeads:
          type: integer
        warmLeads:
          type: integer
        coldLeads:
          type: integer
        averagePrice:
          type: ["number", "null"]
        priorityLeads:
          type: integer
        todayLeads:
          type: integer
      required:
        - totalLeads
        - hotLeads
        - warmLeads
        - coldLeads
        - priorityLeads
        - todayLeads

    PlatformCount:
      type: object
      properties:
        platform:
          type: string
        count:
          type: integer
      required:
        - platform
        - count

    StatusCount:
      type: object
      properties:
        status:
          type: string
        count:
          type: integer
      required:
        - status
        - count

    AnalyzeTariffBody:
      type: object
      properties:
        rawText:
          type: string
          description: Произвольный текст с описанием товаров/услуг и ценами
        businessType:
          type: ["string", "null"]
          description: Тип бизнеса (например, кондитерская, фотограф)
      required:
        - rawText

    TariffItem:
      type: object
      properties:
        name:
          type: string
        description:
          type: ["string", "null"]
        price:
          type: string
        unit:
          type: ["string", "null"]
        category:
          type: ["string", "null"]
      required:
        - name
        - price

    AnalyzeTariffResponse:
      type: object
      properties:
        businessType:
          type: string
        items:
          type: array
          items:
            $ref: "#/components/schemas/TariffItem"
        summary:
          type: string
        botPrompt:
          type: string
          description: Готовый промпт для бота, который будет общаться с клиентами
      required:
        - businessType
        - items
        - summary
        - botPrompt

    TariffSettings:
      type: object
      properties:
        id:
          type: integer
        rawText:
          type: string
        businessType:
          type: string
        structuredData:
          type: string
        botPrompt:
          type: string
        createdAt:
          type: string
        updatedAt:
          type: string
      required:
        - id
        - rawText
        - businessType
        - structuredData
        - botPrompt
        - createdAt
        - updatedAt

    SaveTariffSettingsBody:
      type: object
      properties:
        rawText:
          type: string
        businessType:
          type: string
        structuredData:
          type: string
        botPrompt:
          type: string
      required:
        - rawText
        - businessType
        - structuredData
        - botPrompt
