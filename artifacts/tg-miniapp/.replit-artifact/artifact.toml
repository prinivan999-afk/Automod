kind = "web"
previewPath = "/tg-miniapp/"
title = "Telegram Mini App — AutoMod Business"
version = "1.0.0"
id = "artifacts/tg-miniapp"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/tg-miniapp/" ]
localPort = 22904

[services.development]
run = "pnpm --filter @workspace/tg-miniapp run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/tg-miniapp", "run", "build" ]
publicDir = "artifacts/tg-miniapp/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "22904"
BASE_PATH = "/tg-miniapp/"
