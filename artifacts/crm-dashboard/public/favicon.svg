<svg width="180" height="180" viewBox="0 0 180 180" fill="none" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="textGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#E2F1FF" />
      <stop offset="100%" stop-color="#A5D8FF" />
    </linearGradient>
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#0D0E12" />
      <stop offset="100%" stop-color="#020203" />
    </linearGradient>
  </defs>

  <!-- Rounded dark background matching the user's design -->
  <rect width="180" height="180" rx="36" fill="url(#bgGrad)"/>
  
  <!-- Thin premium border -->
  <rect x="1" y="1" width="178" height="178" rx="35" stroke="#1F2937" stroke-width="2"/>

  <!-- "AM" Stylized Monogram -->
  <g stroke="url(#textGrad)" stroke-width="14" stroke-linecap="round" stroke-linejoin="round">
    <!-- Letter A (Without crossbar for modern look, like the user's reference) -->
    <path d="M 32 130 L 58 50 L 84 130" />
    
    <!-- Letter M -->
    <path d="M 98 130 L 98 50 L 125 100 L 152 50 L 152 130" />
  </g>
</svg>
